<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Actanara product interface mockup</title>
  <desc id="desc">A modern Actanara dashboard mockup with pipeline status, RAG search, task review, and diary timeline panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#eef8f6"/>
      <stop offset="1" stop-color="#fff6f1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10243f"/>
      <stop offset="1" stop-color="#071421"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" x2="1">
      <stop offset="0" stop-color="#40d6b1"/>
      <stop offset="1" stop-color="#5aa7ff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" x2="1">
      <stop offset="0" stop-color="#ff8f70"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#0b1d33" flood-opacity="0.22"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f253d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1330" cy="170" r="170" fill="#d9f7ef" opacity="0.7"/>
  <circle cx="260" cy="850" r="210" fill="#ffe3d7" opacity="0.8"/>
  <path d="M130 750 C390 520 495 910 760 690 C930 550 1030 555 1198 700 C1342 824 1442 650 1510 555" fill="none" stroke="#d7e7f3" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="185" y="125" width="1230" height="750" rx="34" fill="#f9fbfd"/>
    <rect x="205" y="145" width="1190" height="710" rx="24" fill="url(#screen)"/>
  </g>
