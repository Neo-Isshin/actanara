      <rect x="18" y="18" width="74" height="10" rx="5" fill="#40d6b1"/>
      <rect x="18" y="40" width="220" height="8" rx="4" fill="#dce9f4"/>
      <rect x="250" y="24" width="38" height="22" rx="11" fill="#e7faf4"/>
      <rect y="88" width="310" height="70" rx="16" fill="#ffffff" stroke="#e1edf7"/>
      <rect x="18" y="106" width="98" height="10" rx="5" fill="#5aa7ff"/>
      <rect x="18" y="128" width="194" height="8" rx="4" fill="#dce9f4"/>
      <rect x="250" y="112" width="38" height="22" rx="11" fill="#eef5ff"/>
      <rect y="176" width="310" height="70" rx="16" fill="#ffffff" stroke="#e1edf7"/>
      <rect x="18" y="194" width="88" height="10" rx="5" fill="#ff8f70"/>
      <rect x="18" y="216" width="238" height="8" rx="4" fill="#dce9f4"/>
      <rect x="250" y="200" width="38" height="22" rx="11" fill="#fff4eb"/>
