      <rect x="264" width="78" height="230" rx="18" fill="#fff4eb"/>
      <rect x="282" y="22" width="42" height="12" rx="6" fill="#ff8f70"/>
      <rect x="282" y="56" width="42" height="126" rx="12" fill="#ffffff"/>
