      <rect x="18" y="56" width="60" height="56" rx="12" fill="#ffffff"/>
      <rect x="18" y="128" width="60" height="72" rx="12" fill="#ffffff"/>
      <rect x="132" width="96" height="230" rx="18" fill="#e7faf4"/>
      <rect x="150" y="22" width="60" height="12" rx="6" fill="#40d6b1"/>
      <rect x="150" y="56" width="60" height="86" rx="12" fill="#ffffff"/>
